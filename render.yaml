services:
  # PostgreSQL Database Service
  - type: pserv
    name: dating-db
    env: docker
    plan: free
    repo: https://github.com/render-examples/postgres
    envVars:
      - key: POSTGRES_DB
        value: datingsite
      - key: POSTGRES_USER
        value: datingsite_user
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_INITDB_ARGS
        value: "--encoding=UTF-8"

  # Redis Cache Service
  - type: pserv
    name: dating-redis
    env: docker
    plan: free
    repo: https://github.com/render-examples/redis
    envVars:
      - key: REDIS_URL
        value: redis://${HOST}:${PORT}

  # Django Web Service
  - type: web
    name: dating-app
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn datingsite.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: datingsite.settings_production
      - key: DATABASE_URL
        fromDatabase:
          name: dating-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: pserv
          name: dating-redis
          property: url
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
    autoDeploy: yes

  # Background Worker (for tasks like sending notifications)
  - type: worker
    name: dating-worker
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py runworker"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: datingsite.settings_production
      - key: DATABASE_URL
        fromDatabase:
          name: dating-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: pserv
          name: dating-redis
          property: url
      - key: SECRET_KEY
        fromService:
          type: web
          name: dating-app
          property: secretKey
