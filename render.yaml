services:
  # Django Web Service
  - type: web
    name: dating-app
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "gunicorn datingsite.wsgi:application --bind 0.0.0.0:$PORT --workers 3"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: datingsite.settings_production
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
    autoDeploy: yes
